<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实时汇率转换器</title>
    <script type="module" crossorigin src="/assets/index-CT8O1sRA.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Ded0qZs2.css">
  </head>
  <body>
    <main class="app">
      <section class="card">
        <header class="card-header">
          <h1>实时汇率转换</h1>
          <p>输入金额并选择货币，立即获取最新换算结果</p>
        </header>

        <form id="converter-form" class="converter-form">
          <label class="field">
            <span>金额</span>
            <input
              id="amount"
              name="amount"
              type="number"
              min="0"
              step="0.01"
              value="100"
              inputmode="decimal"
              autocomplete="off"
              required
            />
          </label>

          <div class="currency-grid">
            <label class="field">
              <span>源货币</span>
              <select id="from-currency" name="fromCurrency"></select>
            </label>

            <button id="swap-btn" type="button" class="swap-btn" aria-label="交换货币">
              ⇄
            </button>

            <label class="field">
              <span>目标货币</span>
              <select id="to-currency" name="toCurrency"></select>
            </label>
          </div>

          <button id="convert-btn" type="submit" class="convert-btn">转换</button>
        </form>

        <section id="result" class="result" aria-live="polite">
          <p class="result-value">--</p>
          <p class="rate">当前汇率：--</p>
          <p id="updated-at" class="updated-at">更新时间：--</p>
        </section>

        <p id="status" class="status"></p>
      </section>
    </main>

  </body>
</html>
